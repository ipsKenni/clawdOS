name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: bash tests/test_shellcheck.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run overlay tests
        run: bash tests/test_overlay.sh

  build:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker environment
        run: make docker-build-env

      - name: Build ISO
        run: make iso

      - name: Validate ISO
        run: bash tests/test_build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdos-iso
          path: output/*.iso
          retention-days: 7
